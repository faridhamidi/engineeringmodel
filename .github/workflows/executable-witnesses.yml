name: Executable witnesses

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test core boundary witness
        run: python -m unittest discover -s examples/core_boundaries_python/tests -v
      - name: Test builder line witness
        run: python -m unittest discover -s builders/_witness/tests -v
      - name: Check installable skill reference parity
        run: python builders/_witness/sync_skill_references.py --check
      - name: Generate and verify share-ready seed
        run: |
          python seed/generate.py --output "${RUNNER_TEMP}/engineeringmodel-seed"
          python seed/generate.py --verify "${RUNNER_TEMP}/engineeringmodel-seed"
          python seed/generate.py --check "${RUNNER_TEMP}/engineeringmodel-seed"
      - name: Test conformance harness witness
        run: python -m unittest discover -s examples/conformance_harness_python/tests -v
      - name: Run conformance harness audit
        working-directory: examples/conformance_harness_python
        run: python run_audit.py --report-path artifacts/conformance-audit.md
      - name: Test governed authority witness
        run: python -m unittest discover -s examples/governed_authority_python/tests -v
      - name: Compile Python witnesses
        run: python -m compileall -q examples builders seed
